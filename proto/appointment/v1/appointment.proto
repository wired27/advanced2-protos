syntax = "proto3";

package appointment.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/wired27/advanced2-protos-go/appointment/v1;appointmentv1";

enum AppointmentStatus {
  APPOINTMENT_STATUS_UNSPECIFIED = 0;
  APPOINTMENT_STATUS_NEW = 1;
  APPOINTMENT_STATUS_IN_PROGRESS = 2;
  APPOINTMENT_STATUS_DONE = 3;
}

message Appointment {
  string id = 1;
  string title = 2;
  string description = 3;
  string doctor_id = 4;
  AppointmentStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetAppointmentRequest {
  string id = 1;
}

message GetAppointmentResponse {
  Appointment appointment = 1;
}

message ListAppointmentsRequest {}

message ListAppointmentsResponse {
  repeated Appointment appointments = 1;
}

message CreateAppointmentRequest {
  string title = 1;
  string description = 2;
  string doctor_id = 3;
}

message CreateAppointmentResponse {
  Appointment appointment = 1;
}

message UpdateAppointmentStatusRequest {
  string id = 1;
  AppointmentStatus status = 2;
}

message UpdateAppointmentStatusResponse {
  Appointment appointment = 1;
}

service AppointmentService {
  rpc CreateAppointment(CreateAppointmentRequest) returns (CreateAppointmentResponse);
  rpc GetAppointment(GetAppointmentRequest) returns (GetAppointmentResponse);
  rpc ListAppointments(ListAppointmentsRequest) returns (ListAppointmentsResponse);
  rpc UpdateAppointmentStatus(UpdateAppointmentStatusRequest) returns (UpdateAppointmentStatusResponse);
}
